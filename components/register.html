  <body>
    <div id="site-header"></div>

    <main>
      <section class="auth-page-shell">
        <div class="container-fluid">
          <div class="auth-card auth-card--wide">
            <h1 class="auth-title">Create Account</h1>

            <form data-auth-form="register">
              <div class="auth-alert" aria-live="polite"></div>

              <div class="auth-grid">
                <div class="auth-field">
                  <label class="auth-label" for="register-first-name">
                    First Name <span class="required">*</span>
                  </label>
                  <div class="auth-input-wrap">
                    <input
                      class="auth-input"
                      id="register-first-name"
                      type="text"
                      placeholder="First Name"
                      required
                    />
                  </div>
                </div>

                <div class="auth-field">
                  <label class="auth-label" for="register-last-name">
                    Last Name <span class="required">*</span>
                  </label>
                  <div class="auth-input-wrap">
                    <input
                      class="auth-input"
                      id="register-last-name"
                      type="text"
                      placeholder="Last Name"
                      required
                    />
                  </div>
                </div>

                <div class="auth-field auth-field--full">
                  <label class="auth-label" for="register-email">
                    Email Address <span class="required">*</span>
                  </label>
                  <div class="auth-input-wrap">
                    <input
                      class="auth-input"
                      id="register-email"
                      type="email"
                      placeholder="example@mail.com"
                      required
                    />
                  </div>
                </div>

                <div class="auth-field auth-field--full">
                  <label class="auth-label" for="register-phone">Phone Number</label>
                  <div class="auth-input-wrap">
                    <input
                      class="auth-input"
                      id="register-phone"
                      type="tel"
                      placeholder="012xxxxx"
                    />
                  </div>
                </div>

                <div class="auth-field auth-field--full">
                  <label class="auth-label" for="register-password">
                    Password <span class="required">*</span>
                  </label>
                  <div class="auth-input-wrap">
                    <input
                      class="auth-input"
                      id="register-password"
                      type="password"
                      placeholder="Min. 6 characters"
                      required
                    />
                    <button
                      class="auth-toggle-password"
                      type="button"
                      data-password-toggle="register-password"
                      aria-label="Show password"
                    >
                      <i class="fa-regular fa-eye"></i>
                    </button>
                  </div>
                </div>
              </div>

              <button class="auth-submit" type="submit">Register Now</button>

              <div class="auth-footer">
                Already have an account?
                <a class="auth-link" href="./login.html">Sign In</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/pages/auth.js"></script>
    <script src="../js/shared/layout.js"></script>
  </body>
</html>
