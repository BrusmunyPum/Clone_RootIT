    <style>
      body {
        background: #f4f7fb;
      }

      .brand-page {
        padding: 30px 0 54px;
      }

      .brand-hero,
      .brand-grid-card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
      }

      .brand-hero {
        padding: 30px 32px;
        margin-bottom: 24px;
      }

      .brand-hero h1 {
        margin: 0 0 10px;
        color: #1f2937;
        font-size: 28px;

      }

      .brand-hero p {
        margin: 0;
        color: #64748b;
        max-width: 760px;
        line-height: 1.7;
      }

      .brand-grid-card {
        padding: 28px;
      }

      .brand-grid {
        row-gap: 24px;
      }

      .brand-card {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 140px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        text-decoration: none;
      }

      .brand-card:hover {
        transform: translateY(-4px);
        border-color: #bfdbfe;
        box-shadow: 0 20px 36px rgba(15, 23, 42, 0.12);
      }

      .brand-card img {
        max-width: 100%;
        max-height: 90px;
        object-fit: contain;
      }

      .brand-note {
        margin: 24px 0 0;
        color: #94a3b8;
