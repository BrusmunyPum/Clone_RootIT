    <style>
      .products-page {
        padding-bottom: 30px;
      }

      .products-sidebar {
        padding-right: 10px;
      }

      .products-mobile-bar {
        display: none;
      }

      .filter-wrapper-box {
        overflow: hidden;
        margin-bottom: 25px;
        width: 100%;
        background: #fff;
      }

      .filter-header-cus {
        padding: 15px 0 10px !important;
        border-bottom: 1px solid #f0f0f0;
      }

      .filter-header-cus h2 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        color: #3c4643;
        display: flex;
        align-items: center;
        letter-spacing: 0.5px;
        line-height: 1.2;
      }

      .filter-header-cus h2 i {
        margin-right: 8px;
      }

      .icon-blue {
        color: #0132a1;
      }

      .filter-sub-text {
        font-size: 13px;
        color: #777;
        margin: 10px 0 0;
        line-height: 1.5;
        font-weight: 400;
      }

      .sidebar-filter {
        padding: 10px 0;
      }

      .filter-box {
        margin-bottom: 15px;
        border-bottom: 1px solid #f0f0f0;
        padding-bottom: 10px;
      }

      .filter-box:last-child {
        margin-bottom: 0;
      }

      .filter-title {
        font-size: 14px;
        font-weight: 600;
        color: #3c4643;
        margin: 12px 0;
        letter-spacing: 0.5px;
      }

      .filter-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
        border: none;
        background: transparent;
        color: #3c4643;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-align: left;
      }

      .filter-toggle i:last-child {
        color: #0132a1;
        font-size: 12px;
        transition: transform 0.2s ease;
      }

      .filter-box.is-open .filter-toggle i:last-child {
        transform: rotate(180deg);
      }

      .brand-scroll {
        max-height: 380px;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 8px;
        margin-bottom: 10px;
        -webkit-overflow-scrolling: touch;
      }

      .brand-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .brand-scroll::-webkit-scrollbar-thumb {
        background: #b1b1b1;
        border-radius: 10px;
      }

      .filter-link-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 0 10px 6px;
        cursor: pointer;
      }

      .filter-link-item input {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: #0132a1;
      }

      .filter-link-item label {
        flex: 1;
        margin: 0;
        color: #3c4643;
        font-size: 14px;
        font-weight: 400;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .count-num {
        color: #8a8a8a;
        font-size: 12px;
      }

      .filter-link-item.active-filter label {
        color: #0132a1;
        font-weight: 600;
      }

      .clear-all-btn {
        width: 100%;
        background: #0132a1;
        color: #fff !important;
        padding: 10px;
        border-radius: 2px;
        text-align: center;
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-top: 18px;
        text-decoration: none !important;
      }

      .catalog-status {
        font-size: 12px;
        color: #8a8a8a;
        margin-top: 10px;
      }

      .products-main {
        padding-left: 10px;
      }

      .results-bar {
        margin-bottom: 15px;
        padding: 5px 0 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #e7e7e7;
      }

      #results-text-display {
        font-size: 14px;
        color: #3c4643;
      }

      .sort-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #3c4643;
      }

      .sort-select {
        min-width: 140px;
        height: 32px;
        padding: 4px 28px 4px 10px;
        border: 1px solid #dcdcdc;
        background: #fff;
        border-radius: 2px;
        font-size: 14px;
      }

      #filter-result {
        min-height: 420px;
      }

      .product-grid {
        margin-left: -8px;
        margin-right: -8px;
      }

      .product-card-col {
        padding-left: 8px;
        padding-right: 8px;
        margin-bottom: 28px;
      }

      .catalog-product-card {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        border: none;
        box-shadow: none;
        background: transparent;
      }

      .catalog-product-image {
        width: 100%;
        height: 145px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .catalog-product-image img {
        max-height: 145px;
        width: auto;
        max-width: 100%;
        object-fit: contain;
      }

      .catalog-product-title {
        border-top: 1px solid #efefef;
        width: 88%;
        padding-top: 10px;
      }

      .catalog-product-title h3 {
        margin: 0;
        height: 42px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .catalog-product-title h3 a {
        font-size: 13px;
        line-height: 1.45;
        color: #24313d;
        font-weight: 500;
        text-decoration: none;
      }

      .catalog-product-title h3 a:hover {
        color: #0132a1;
      }

      .catalog-product-price {
        padding-top: 3px;
        text-align: center;
      }

      .catalog-product-price span {
        font-size: 16px;
        color: #3c4643;
        font-weight: 700;
      }

      .catalog-pagination {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 8px;
      }

      .pagination-btn {
        min-width: 34px;
        padding: 7px 10px;
        border: 1px solid #d8d8d8;
        background: #fff;
        font-size: 13px;
      }

      .pagination-btn.active {
        background: #0132a1;
        border-color: #0132a1;
        color: #fff;
      }

      .pagination-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .products-empty,
      .products-loading {
        text-align: center;
        padding: 110px 20px;
        color: #64748b;
      }

      .products-empty i,
      .products-loading i {
        color: #0132a1;
        margin-bottom: 12px;
      }

      @media (max-width: 991px) {
        .products-page {
          padding-bottom: 18px;
        }

        .products-main {
          padding-left: 15px;
          padding-right: 15px;
        }

        .products-mobile-bar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 12px;
          margin-bottom: 14px;
        }

        .products-mobile-btn {
          flex: 1 1 0;
          height: 44px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          border: 1px solid #d9e1ef;
          border-radius: 12px;
          background: #fff;
          color: #16326d;
          font-size: 14px;
          font-weight: 600;
          box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
        }

        .products-sidebar {
          position: fixed;
          top: 0;
          left: 0;
          width: min(88vw, 360px);
          height: 100vh;
          padding: 0;
          background: #fff;
          z-index: 100070;
          box-shadow: 18px 0 40px rgba(15, 23, 42, 0.16);
          transform: translateX(-100%);
          transition: transform 0.25s ease;
        }

        body.products-filters-open .products-sidebar {
          transform: translateX(0);
        }

        .products-filter-overlay {
          position: fixed;
          inset: 0;
          background: rgba(15, 23, 42, 0.34);
          opacity: 0;
          visibility: hidden;
          transition: opacity 0.25s ease, visibility 0.25s ease;
          z-index: 100060;
        }

        body.products-filters-open .products-filter-overlay {
          opacity: 1;
          visibility: visible;
        }

        body.products-filters-open {
          overflow: hidden;
        }

        .filter-wrapper-box {
          height: 100%;
          margin-bottom: 0;
          display: flex;
          flex-direction: column;
          padding: 0 16px 20px;
        }

        .filter-header-cus {
          position: sticky;
          top: 0;
          z-index: 2;
          background: #fff;
          padding: 16px 0 14px !important;
        }

        .filter-header-row {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 16px;
        }

        .filter-close-btn {
          width: 40px;
          height: 40px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          border: 1px solid #d9e1ef;
          border-radius: 12px;
          background: #fff;
          color: #0132a1;
          box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
        }

        .sidebar-filter {
          flex: 1 1 auto;
          overflow-y: auto;
          padding: 10px 0 0;
        }

        .filter-box .brand-scroll {
          display: none;
          max-height: 280px;
        }

        .filter-box.is-open .brand-scroll {
          display: block;
        }

        .results-bar {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
          margin-bottom: 18px;
        }

        .sort-wrapper {
          width: 100%;
          justify-content: space-between;
        }

        .sort-select {
          flex: 1 1 auto;
          min-width: 0;
          height: 42px;
          border-radius: 12px;
          padding-left: 14px;
        }

        .product-card-col {
          margin-bottom: 22px;
        }

        .catalog-product-image {
          height: 120px;
        }

        .catalog-product-image img {
          max-height: 120px;
        }

        .catalog-product-title {
          width: 100%;
        }

        .catalog-product-title h3 {
          height: 48px;
        }

        .catalog-product-title h3 a {
          font-size: 12px;
        }

        .catalog-product-price span {
          font-size: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div id="site-header"></div>

    <main>
      <div class="breadcrumb_cus">
        <div class="container-fluid">
          <ol class="breadcrumb">
            <li><a href="../index.html"></a></li>
            <li class="active">IT Products &amp; Inquiries</li>
          </ol>
        </div>
      </div>

      <div class="content_wrapper products-page">
        <div class="container-fluid">
          <div class="products-filter-overlay" data-products-filter-close></div>
          <div class="row">
            <div class="col-lg-3 col-md-4 products-sidebar">
              <div class="filter-wrapper-box">
                <div class="filter-header-cus">
                  <div class="filter-header-row">
                    <div>
                      <h2>
                        <i class="fa-solid fa-sliders icon-blue"></i>
                        Smart Selection
                      </h2>
                      <p class="filter-sub-text">
                        Select options to find your perfect match.
                      </p>
                    </div>
                    <button
                      type="button"
                      class="filter-close-btn d-inline-flex d-md-none"
                      data-products-filter-close
                      aria-label="Close filters"
                    >
                      <i class="fa-solid fa-xmark"></i>
                    </button>
                  </div>
                </div>

                <div class="sidebar-filter">
                  <div class="filter-box is-open" data-filter-section>
                    <button
                      type="button"
                      class="filter-toggle"
                      data-filter-toggle
                      aria-expanded="true"
                    >
                      <span class="filter-title">Category</span>
                      <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="brand-scroll" id="category-filter-list"></div>
                  </div>

                  <div class="filter-box is-open" data-filter-section>
                    <button
                      type="button"
                      class="filter-toggle"
                      data-filter-toggle
                      aria-expanded="true"
                    >
                      <span class="filter-title">Brand</span>
                      <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="brand-scroll" id="brand-filter-list"></div>
                  </div>

                  <a
                    class="clear-all-btn"
                    id="clear-filters-btn"
                    href="./product-all.html"
                  >
                    Clear All Filters
                  </a>
                  <div class="catalog-status" id="catalog-status-text"></div>
                </div>
              </div>
            </div>

            <div class="col-lg-9 col-md-8 col-12 products-main">
              <div class="products-mobile-bar d-flex d-md-none">
                <button
                  type="button"
                  class="products-mobile-btn"
                  data-products-filter-open
                >
                  <i class="fa-solid fa-sliders"></i>
                  Filters
                </button>
              </div>
              <div class="results-bar">
                <div id="results-text-display">Loading all products...</div>
                <div class="sort-wrapper">
                  <span class="sort-label">Sort by:</span>
                  <select class="sort-select" id="sort_by">
                    <option value="newest">Newest Arrivals</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                  </select>
                </div>
              </div>

              <div id="filter-result">
                <div class="products-loading">
                  <i class="fa-solid fa-spinner fa-spin fa-3x" aria-hidden="true"></i>
                  <div>Loading all products...</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12.0.3/swiper-bundle.min.js"></script>
    <script src="../js/pages/product-all.js"></script>
    <script src="../js/shared/layout.js"></script>
    <script>document.addEventListener("DOMContentLoaded", function () { if (window.RootITPage && typeof window.RootITPage.initProductAll === "function") { window.RootITPage.initProductAll(); } });</script>
  </body>
