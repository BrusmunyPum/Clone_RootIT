    <style>
      .products-page {
        padding-bottom: 30px;
      }

      .products-sidebar {
        padding-right: 10px;
      }

      .filter-wrapper-box {
        overflow: hidden;
        margin-bottom: 25px;
        width: 100%;
      }

      .filter-header-cus {
        padding: 15px 0 10px !important;
        border-bottom: 1px solid #f0f0f0;
      }

      .filter-header-cus h2 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        color: #3c4643;
        display: flex;
        align-items: center;
        letter-spacing: 0.5px;
        line-height: 1.2;
      }

      .filter-header-cus h2 i {
        margin-right: 8px;
      }

      .icon-blue {
        color: #0132a1;
      }

      .filter-sub-text {
        font-size: 13px;
        color: #777;
        margin: 10px 0 0;
        line-height: 1.5;
        font-weight: 400;
      }

      .sidebar-filter {
        padding: 10px 0;
      }

      .filter-box {
        margin-bottom: 15px;
        border-bottom: 1px solid #f0f0f0;
        padding-bottom: 10px;
      }

      .filter-title {
        font-size: 14px;
        font-weight: 600;
        color: #3c4643;
        margin: 12px 0;
        letter-spacing: 0.5px;
      }

      .brand-scroll {
        max-height: 380px;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 8px;
        margin-bottom: 10px;
        -webkit-overflow-scrolling: touch;
      }

      .brand-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .brand-scroll::-webkit-scrollbar-thumb {
        background: #b1b1b1;
        border-radius: 10px;
      }

      .filter-link-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 0 10px 6px;
        cursor: pointer;
      }

      .filter-link-item input {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: #0132a1;
      }

      .filter-link-item label {
        flex: 1;
        margin: 0;
        color: #3c4643;
        font-size: 14px;
        font-weight: 400;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .count-num {
        color: #8a8a8a;
        font-size: 12px;
      }

      .filter-link-item.active-filter label {
        color: #0132a1;
        font-weight: 600;
      }

      .clear-all-btn {
        width: 100%;
        background: #0132a1;
        color: #fff !important;
        padding: 10px;
        border-radius: 2px;
        text-align: center;
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-top: 18px;
        text-decoration: none !important;
      }

      .catalog-status {
        font-size: 12px;
        color: #8a8a8a;
        margin-top: 10px;
      }

      .products-main {
        padding-left: 10px;
      }

      .results-bar {
        margin-bottom: 15px;
        padding: 5px 0 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #e7e7e7;
      }

      #results-text-display {
        font-size: 14px;
        color: #3c4643;
      }

      .sort-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #3c4643;
      }

      .sort-select {
        min-width: 140px;
        height: 32px;
        padding: 4px 28px 4px 10px;
        border: 1px solid #dcdcdc;
        background: #fff;
        border-radius: 2px;
        font-size: 14px;
      }

      #filter-result {
        min-height: 420px;
      }

      .product-grid {
        margin-left: -8px;
        margin-right: -8px;
      }

      .product-card-col {
        padding-left: 8px;
        padding-right: 8px;
        margin-bottom: 28px;
      }

      .catalog-product-card {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        border: none;
        box-shadow: none;
        background: transparent;
      }

      .catalog-product-image {
        width: 100%;
        height: 145px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .catalog-product-image img {
        max-height: 145px;
        width: auto;
        max-width: 100%;
        object-fit: contain;
      }

      .catalog-product-title {
        border-top: 1px solid #efefef;
        width: 88%;
        padding-top: 10px;
      }

      .catalog-product-title h3 {
        margin: 0;
        height: 42px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .catalog-product-title h3 a {
        font-size: 13px;
        line-height: 1.45;
        color: #24313d;
        font-weight: 500;
        text-decoration: none;
      }

      .catalog-product-title h3 a:hover {
        color: #0132a1;
      }

      .catalog-product-price {
        padding-top: 3px;
        text-align: center;
      }

      .catalog-product-price span {
        font-size: 16px;
        color: #3c4643;
        font-weight: 700;
      }

      .catalog-pagination {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 8px;
      }

      .pagination-btn {
        min-width: 34px;
        padding: 7px 10px;
        border: 1px solid #d8d8d8;
        background: #fff;
        font-size: 13px;
      }

      .pagination-btn.active {
        background: #0132a1;
        border-color: #0132a1;
        color: #fff;
      }

      .pagination-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .products-empty,
      .products-loading {
        text-align: center;
        padding: 110px 20px;
        color: #64748b;
      }

      .products-empty i,
      .products-loading i {
        color: #0132a1;
        margin-bottom: 12px;
      }

      @media (max-width: 991px) {
        .products-sidebar,
        .products-main {
          padding-left: 15px;
          padding-right: 15px;
        }

        .results-bar {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <div id="site-header"></div>

    <main>
      <div class="breadcrumb_cus">
        <div class="container-fluid">
          <ol class="breadcrumb">
            <li><a href="/"></a></li>
            <li class="active">IT Products &amp; Inquiries</li>
          </ol>
        </div>
      </div>

      <div class="content_wrapper products-page">
        <div class="container-fluid">
          <div class="row">
            <div class="col-md-2 col-sm-3 hidden-xs products-sidebar">
              <div class="filter-wrapper-box">
                <div class="filter-header-cus">
                  <h2>
                    <i class="fa-solid fa-sliders icon-blue"></i>
                    Smart Selection
                  </h2>
                  <p class="filter-sub-text">
                    Select options to find your perfect match.
                  </p>
                </div>

                <div class="sidebar-filter">
                  <div class="filter-box">
                    <h4 class="filter-title">Category</h4>
                    <div class="brand-scroll" id="category-filter-list"></div>
                  </div>

                  <div class="filter-box">
                    <h4 class="filter-title">Brand</h4>
                    <div class="brand-scroll" id="brand-filter-list"></div>
                  </div>

                  <a
                    class="clear-all-btn"
                    id="clear-filters-btn"
                    href="./product-all.html"
                  >
                    Clear All Filters
                  </a>
                  <div class="catalog-status" id="catalog-status-text"></div>
                </div>
              </div>
            </div>

            <div class="col-md-10 col-sm-9 products-main">
              <div class="results-bar">
                <div id="results-text-display">Loading all products...</div>
                <div class="sort-wrapper">
                  <span class="sort-label">Sort by:</span>
                  <select class="sort-select" id="sort_by">
                    <option value="newest">Newest Arrivals</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                  </select>
                </div>
              </div>

              <div id="filter-result">
                <div class="products-loading">
                  <i class="fa fa-spinner fa-spin fa-3x"></i>
                  <div>Loading all products...</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
