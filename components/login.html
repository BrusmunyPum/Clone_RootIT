    <link rel="preconnect" href="https://cdn.jsdelivr.net/" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

      referrerpolicy="no-referrer"

    <link rel="stylesheet" type="text/css" href="../css/nav-desk.css" />

  <body>
    <div id="site-header"></div>

    <main>
      <section class="auth-page-shell">
        <div class="container-fluid">
          <div class="auth-card">
            <h1 class="auth-title">Sign In</h1>

            <div class="auth-demo-credentials">
              <strong>Demo account:</strong>
              <code>demo@rootit.local</code> /
              <code>RootIT123!</code>
            </div>

            <form data-auth-form="login">
              <div class="auth-alert" aria-live="polite"></div>

              <div class="auth-field">
                <label class="auth-label" for="login-email">
                  Email or Phone Number <span class="required">*</span>
                </label>
                <div class="auth-input-wrap">
                  <input
                    class="auth-input"
                    id="login-email"
                    type="text"
                    placeholder="example@mail.com"
                    required
                  />
                </div>
              </div>

              <div class="auth-field">
                <label class="auth-label" for="login-password">
                  Password <span class="required">*</span>
                </label>
                <div class="auth-input-wrap">
                  <input
                    class="auth-input"
                    id="login-password"
                    type="password"
                    placeholder="Enter your password"
                    required
                  />
                  <button
                    class="auth-toggle-password"
                    type="button"
                    data-password-toggle="login-password"
                    aria-label="Show password"
                  >
                    <i class="fa-regular fa-eye"></i>
                  </button>
                </div>
              </div>

              <div class="auth-meta">
                <a class="auth-link" href="#">Forgot Password?</a>
              </div>

              <button class="auth-submit" type="submit">Sign In</button>

              <div class="auth-footer">
                Don&apos;t have an account?
                <a class="auth-link" href="./register.html">Create an account</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12.0.3/swiper-bundle.min.js"></script>
    <script src="../js/pages/auth.js"></script>
    <script src="../js/shared/layout.js"></script>
  </body>
</html>
